kind = "web"
previewPath = "/"
title = "SmokeCraft"
version = "1.0.0"
id = "artifacts/smokecraft"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26250

[services.development]
run = "pnpm --filter @workspace/smokecraft run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smokecraft", "run", "build" ]
publicDir = "artifacts/smokecraft/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26250"
BASE_PATH = "/"

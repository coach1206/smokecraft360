<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>NOVEE OS</title>
    <meta name="description" content="An adaptive intelligence operating system designed to transform physical environments into predictive, emotionally intelligent experiences." />
    <meta name="theme-color" content="#D4AF37" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- iOS / iPadOS standalone install (Safari has no beforeinstallprompt;
         these meta tags + the InstallBanner Add-to-Home hint are how the
         kiosk app installs on iPad). -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NOVEE OS" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <!-- Fonts are served locally via @fontsource (see main.tsx) for offline kiosk resilience.
         Inter is kept as a CDN fallback only for builds that have not yet bundled the fontsource packages. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

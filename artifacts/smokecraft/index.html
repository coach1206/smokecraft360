<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>SmokeCraft 360</title>
    <meta name="description" content="A luxury cigar ritual platform — leaf profile mapping, personalized recommendations, and lounge intelligence powered by NOVEE OS." />
    <meta name="theme-color" content="#D4AF37" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- iOS / iPadOS standalone install (Safari has no beforeinstallprompt;
         these meta tags + the InstallBanner Add-to-Home hint are how the
         kiosk app installs on iPad). -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SmokeCraft 360" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <!-- Fonts are served locally via @fontsource (see main.tsx) for offline kiosk resilience. -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

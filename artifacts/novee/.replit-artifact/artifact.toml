kind = "web"
previewPath = "/novee/"
title = "NOVEE OS"
version = "1.0.0"
id = "artifacts/novee"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/novee/" ]
localPort = 23331

[services.development]
run = "pnpm --filter @workspace/novee run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/novee", "run", "build" ]
publicDir = "artifacts/novee/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23331"
BASE_PATH = "/novee/"

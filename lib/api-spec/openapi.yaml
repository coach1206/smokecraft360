openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: craft-builds
    description: Craft Experience Engine build state
  - name: design-drafts
    description: Pre-gameplay design playground saves
  - name: craft-sessions
    description: Craft session timer and streak state
  - name: ai
    description: AI image generation with Cloudinary caching
  - name: kernel
    description: NOVEE OS Titan Kernel — module registry, mode config, and telemetry

paths:
  /ai/generate-image:
    post:
      operationId: generateAiImage
      tags: [ai]
      summary: Generate or retrieve cached AI style card image
      description: Builds a brand-tuned prompt from craft+style, checks the Cloudinary cache, generates with gpt-image-1 on a miss, and returns the URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiImageRequestBody"
      responses:
        "200":
          description: Image URL (from cache or freshly generated)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiImageResult"
        "400":
          description: Invalid request body
        "500":
          description: Generation failed

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /craft-builds:
    get:
      operationId: getCraftBuild
      tags: [craft-builds]
      summary: Get latest build for a craft
      parameters:
        - in: query
          name: craft
          required: true
          schema:
            $ref: "#/components/schemas/CraftType"
      responses:
        "200":
          description: Latest build or null
          content:
            application/json:
              schema:
                type: object
                properties:
                  build:
                    oneOf:
                      - $ref: "#/components/schemas/CraftBuild"
                      - type: "null"
                required: [build]
    post:
      operationId: createCraftBuild
      tags: [craft-builds]
      summary: Create a new build
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCraftBuildRequest"
      responses:
        "201":
          description: Created build
          content:
            application/json:
              schema:
                type: object
                properties:
                  build:
                    $ref: "#/components/schemas/CraftBuild"
                required: [build]
    patch:
      operationId: upsertCraftBuild
      tags: [craft-builds]
      summary: Idempotent upsert by (userId, craft)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertCraftBuildRequest"
      responses:
        "200":
          description: Updated build
          content:
            application/json:
              schema:
                type: object
                properties:
                  build:
                    $ref: "#/components/schemas/CraftBuild"
                  created:
                    type: boolean
                required: [build, created]
        "201":
          description: Inserted build (first save)
          content:
            application/json:
              schema:
                type: object
                properties:
                  build:
                    $ref: "#/components/schemas/CraftBuild"
                  created:
                    type: boolean
                required: [build, created]

  /design-drafts:
    get:
      operationId: getDesignDrafts
      tags: [design-drafts]
      summary: Get most recent 3 drafts for a craft
      parameters:
        - in: query
          name: craft
          required: true
          schema:
            $ref: "#/components/schemas/CraftType"
      responses:
        "200":
          description: List of drafts
          content:
            application/json:
              schema:
                type: object
                properties:
                  drafts:
                    type: array
                    items:
                      $ref: "#/components/schemas/DesignDraft"
                required: [drafts]
    post:
      operationId: createDesignDraft
      tags: [design-drafts]
      summary: Create a new design draft
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDesignDraftRequest"
      responses:
        "201":
          description: Created draft
          content:
            application/json:
              schema:
                type: object
                properties:
                  draft:
                    $ref: "#/components/schemas/DesignDraft"
                required: [draft]
    patch:
      operationId: upsertDesignDraft
      tags: [design-drafts]
      summary: Idempotent upsert by (userId, craft)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertDesignDraftRequest"
      responses:
        "200":
          description: Updated draft
          content:
            application/json:
              schema:
                type: object
                properties:
                  draft:
                    $ref: "#/components/schemas/DesignDraft"
                  created:
                    type: boolean
                required: [draft, created]
        "201":
          description: Inserted draft
          content:
            application/json:
              schema:
                type: object
                properties:
                  draft:
                    $ref: "#/components/schemas/DesignDraft"
                  created:
                    type: boolean
                required: [draft, created]

  /design-drafts/{id}:
    delete:
      operationId: deleteDesignDraft
      tags: [design-drafts]
      summary: Delete a design draft
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  id:
                    type: string
                    format: uuid
                required: [message, id]

  /craft-sessions:
    get:
      operationId: getCraftSession
      tags: [craft-sessions]
      summary: Get current session for a craft
      parameters:
        - in: query
          name: craft
          required: true
          schema:
            $ref: "#/components/schemas/CraftType"
      responses:
        "200":
          description: Current session or null
          content:
            application/json:
              schema:
                type: object
                properties:
                  session:
                    oneOf:
                      - $ref: "#/components/schemas/CraftSession"
                      - type: "null"
                required: [session]
    post:
      operationId: createCraftSession
      tags: [craft-sessions]
      summary: Start a new craft session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCraftSessionRequest"
      responses:
        "201":
          description: Created session
          content:
            application/json:
              schema:
                type: object
                properties:
                  session:
                    $ref: "#/components/schemas/CraftSession"
                required: [session]
    patch:
      operationId: upsertCraftSession
      tags: [craft-sessions]
      summary: Idempotent upsert by (userId, craft) — auto-save hot path
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertCraftSessionRequest"
      responses:
        "200":
          description: Updated session
          content:
            application/json:
              schema:
                type: object
                properties:
                  session:
                    $ref: "#/components/schemas/CraftSession"
                  created:
                    type: boolean
                required: [session, created]
        "201":
          description: Inserted session
          content:
            application/json:
              schema:
                type: object
                properties:
                  session:
                    $ref: "#/components/schemas/CraftSession"
                  created:
                    type: boolean
                required: [session, created]

  /craft-sessions/{id}:
    delete:
      operationId: deleteCraftSession
      tags: [craft-sessions]
      summary: Abandon and clear a craft session
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  id:
                    type: string
                    format: uuid
                required: [message, id]

  /kernel/modules:
    get:
      operationId: listKernelModules
      tags: [kernel]
      summary: List all registered kernel modules
      responses:
        "200":
          description: Module list
          content:
            application/json:
              schema:
                type: object
                properties:
                  modules:
                    type: array
                    items:
                      $ref: "#/components/schemas/KernelModule"
                required: [modules]
    post:
      operationId: registerKernelModule
      tags: [kernel]
      summary: Register a new kernel module (super_admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KernelModuleInput"
      responses:
        "201":
          description: Registered module
          content:
            application/json:
              schema:
                type: object
                properties:
                  module:
                    $ref: "#/components/schemas/KernelModule"
                required: [module]
        "403":
          description: Forbidden

  /kernel/mode/{venueId}:
    get:
      operationId: getKernelMode
      tags: [kernel]
      summary: Get current Sovereign/Essential mode for a venue
      parameters:
        - in: path
          name: venueId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Current mode config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KernelModeResponse"
    patch:
      operationId: setKernelMode
      tags: [kernel]
      summary: Set Sovereign/Essential mode (admin/super_admin only)
      parameters:
        - in: path
          name: venueId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KernelModeInput"
      responses:
        "200":
          description: Updated mode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KernelModeResponse"
        "403":
          description: Forbidden

  /kernel/telemetry:
    post:
      operationId: ingestTelemetryEvent
      tags: [kernel]
      summary: Ingest a telemetry event from a module
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TelemetryEventInput"
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required: [ok]
        "400":
          description: Invalid payload

  /kernel/telemetry/summary:
    get:
      operationId: getKernelTelemetrySummary
      tags: [kernel]
      summary: Aggregated E.A.T. Engine telemetry summary
      responses:
        "200":
          description: Telemetry summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelemetrySummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    CraftType:
      type: string
      enum: [smoke, brew, pour, vape]

    CraftPhase:
      type: string
      enum: [intro, style, profile, match, reveal]

    CraftBuild:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        venueId:
          type: string
          format: uuid
          nullable: true
        sessionId:
          type: string
          format: uuid
          nullable: true
        craft:
          $ref: "#/components/schemas/CraftType"
        phase:
          $ref: "#/components/schemas/CraftPhase"
        styleChoice:
          type: string
          nullable: true
        moodChoice:
          type: string
          nullable: true
        profileAnswers:
          type: object
          additionalProperties: true
        score:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, userId, craft, phase, createdAt, updatedAt]

    CreateCraftBuildRequest:
      type: object
      properties:
        craft:
          $ref: "#/components/schemas/CraftType"
        venueId:
          type: string
          format: uuid
        sessionId:
          type: string
          format: uuid
        phase:
          $ref: "#/components/schemas/CraftPhase"
        styleChoice:
          type: string
        moodChoice:
          type: string
        profileAnswers:
          type: object
          additionalProperties: true
        score:
          type: number
      required: [craft]

    UpsertCraftBuildRequest:
      type: object
      properties:
        craft:
          $ref: "#/components/schemas/CraftType"
        phase:
          $ref: "#/components/schemas/CraftPhase"
        styleChoice:
          type: string
        moodChoice:
          type: string
        profileAnswers:
          type: object
          additionalProperties: true
        score:
          type: number
      required: [craft]

    DesignDraft:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        venueId:
          type: string
          format: uuid
          nullable: true
        craft:
          $ref: "#/components/schemas/CraftType"
        draftName:
          type: string
        payload:
          type: object
          additionalProperties: true
        lockedFields:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, userId, craft, draftName, payload, lockedFields, createdAt, updatedAt]

    CreateDesignDraftRequest:
      type: object
      properties:
        craft:
          $ref: "#/components/schemas/CraftType"
        draftName:
          type: string
        payload:
          type: object
          additionalProperties: true
        lockedFields:
          type: array
          items:
            type: string
      required: [craft, payload]

    UpsertDesignDraftRequest:
      type: object
      properties:
        craft:
          $ref: "#/components/schemas/CraftType"
        draftName:
          type: string
        payload:
          type: object
          additionalProperties: true
        lockedFields:
          type: array
          items:
            type: string
      required: [craft]

    CraftSession:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        venueId:
          type: string
          format: uuid
          nullable: true
        craft:
          $ref: "#/components/schemas/CraftType"
        buildId:
          type: string
          format: uuid
          nullable: true
        timerStartedAt:
          type: string
          format: date-time
          nullable: true
        timerDurationSecs:
          type: integer
        phase:
          $ref: "#/components/schemas/CraftPhase"
        streakCount:
          type: integer
        lastSavedAt:
          type: string
          format: date-time
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, userId, craft, timerDurationSecs, phase, streakCount, createdAt]

    CreateCraftSessionRequest:
      type: object
      properties:
        craft:
          $ref: "#/components/schemas/CraftType"
        buildId:
          type: string
          format: uuid
        timerDurationSecs:
          type: integer
          minimum: 1800
          maximum: 2400
      required: [craft]

    UpsertCraftSessionRequest:
      type: object
      properties:
        craft:
          $ref: "#/components/schemas/CraftType"
        phase:
          $ref: "#/components/schemas/CraftPhase"
        streakCount:
          type: integer
          minimum: 0
        buildId:
          type: string
          format: uuid
        remainingMs:
          type: integer
          minimum: 0
      required: [craft]

    AiImageRequestBody:
      type: object
      properties:
        craft:
          type: string
          description: Craft type (pour, brew, smoke, vape)
        styleId:
          type: string
          description: Style card identifier (e.g. smooth, spicy, light, amber)
        prompt:
          type: string
          description: Optional override prompt
      required: [craft, styleId]

    AiImageResult:
      type: object
      properties:
        url:
          type: string
          format: uri
          description: Cloudinary CDN URL of the generated image
        cached:
          type: boolean
          description: Whether the image was served from the cache
      required: [url, cached]

    KernelModule:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        craftType:
          type: string
          enum: [smoke, pour, brew, vape, none]
        slug:
          type: string
        status:
          type: string
          enum: [active, inactive, suspended]
        description:
          type: ["string", "null"]
        launchUrl:
          type: ["string", "null"]
        registeredAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, craftType, slug, status, registeredAt, updatedAt]

    KernelModuleInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        craftType:
          type: string
          enum: [smoke, pour, brew, vape, none]
        slug:
          type: string
          minLength: 1
        status:
          type: string
          enum: [active, inactive, suspended]
        description:
          type: string
        launchUrl:
          type: string
      required: [name, slug]

    KernelModeResponse:
      type: object
      properties:
        venueId:
          type: string
          format: uuid
        mode:
          type: string
          enum: [sovereign, essential]
        updatedAt:
          type: ["string", "null"]
          format: date-time
      required: [venueId, mode]

    KernelModeInput:
      type: object
      properties:
        mode:
          type: string
          enum: [sovereign, essential]
      required: [mode]

    TelemetryEventInput:
      type: object
      properties:
        moduleId:
          type: string
          format: uuid
        venueId:
          type: string
          format: uuid
        eventType:
          type: string
          minLength: 1
        payload:
          type: object
          additionalProperties: true
      required: [eventType]

    TelemetryDayCount:
      type: object
      properties:
        day:
          type: string
        cnt:
          type: integer
      required: [day, cnt]

    TelemetryEventTypeStat:
      type: object
      properties:
        event_type:
          type: string
        cnt:
          type: integer
      required: [event_type, cnt]

    TelemetryModuleUsage:
      type: object
      properties:
        module_name:
          type: string
        module_slug:
          type: string
        event_count:
          type: integer
      required: [module_name, module_slug, event_count]

    TelemetrySummary:
      type: object
      properties:
        total:
          type: integer
        dailyCounts:
          type: array
          items:
            $ref: "#/components/schemas/TelemetryDayCount"
        topEventTypes:
          type: array
          items:
            $ref: "#/components/schemas/TelemetryEventTypeStat"
        moduleUsage:
          type: array
          items:
            $ref: "#/components/schemas/TelemetryModuleUsage"
        ritualEngagement:
          type: integer
          description: "Ratio of build-completions to swipe-starts expressed as 0-100"
      required: [total, dailyCounts, topEventTypes, moduleUsage, ritualEngagement]
